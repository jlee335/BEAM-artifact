version: '3.8'

services:
  evaluator:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: vllm-evaluator
      args:
        RUN_WHEEL_CHECK: 'false'
        VLLM_USE_PRECOMPILED: '1'
        BUILDKIT_INLINE_CACHE: '1'
      cache_from:
        - jlee335/beam-volume-260307:latest
    image: jlee335/beam-volume-260307:latest
    container_name: vllm_evaluator_env
    privileged: true
    init: true
    user: root
    # Host IPC is necessary for PyTorch massive shared memory (equivalent to --shm-size)
    ipc: host
    environment:
      - HF_HOME=/workspace/.cache/huggingface
      - CUDA_HOME=/usr/local/cuda
      - HF_TOKEN  # inherited from host environment if set
    volumes:
      # Mount the benchmarks directory to sync evaluation results back to the host
      - ./benchmarks:/workspace/benchmarks
      # Mount Hugging Face cache to avoid re-downloading massive models
      - ~/.cache/huggingface:/workspace/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    # Override the default vllm serve entrypoint
    entrypoint: /bin/bash
    # Evaluation dependencies are baked into the vllm-evaluator Dockerfile stage
    command: >
      -c "echo 'Evaluator environment ready.' && tail -f /dev/null"
